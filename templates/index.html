<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emotion Detector</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 0 20px;
            background-color: #f5f5f5;
        }
        h1 { color: #333; }
        textarea {
            width: 100%;
            height: 120px;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
            resize: vertical;
            box-sizing: border-box;
        }
        button {
            margin-top: 10px;
            padding: 10px 24px;
            font-size: 16px;
            background-color: #0062cc;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover { background-color: #004a9e; }
        #output {
            margin-top: 20px;
            padding: 16px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 4px;
            min-height: 50px;
            font-size: 15px;
        }
    </style>
</head>
<body>
    <h1>Emotion Detector</h1>
    <p>Enter a statement and click <strong>Run Sentiment Analysis</strong> to detect the dominant emotion.</p>
    <textarea id="textToAnalyze" placeholder="Type something here..."></textarea>
    <br>
    <button onclick="analyzeEmotion()">Run Sentiment Analysis</button>
    <div id="output">Results will appear here.</div>

    <script>
        async function analyzeEmotion() {
            const text = document.getElementById('textToAnalyze').value.trim();
            if (!text) {
                document.getElementById('output').innerText = 'Please enter some text.';
                return;
            }
            document.getElementById('output').innerText = 'Analyzing...';
            const response = await fetch(`/emotionDetector?textToAnalyze=${encodeURIComponent(text)}`);
            const result = await response.text();
            document.getElementById('output').innerText = result;
        }
    </script>
</body>
</html>
